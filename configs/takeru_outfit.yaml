# takeru_outfit.yaml
# キャラクター「タケル・フカガワ」の服装LoRA学習データセット構築用設定
# 目標: functional hoodie + black rimmed glasses + slim build

dataset_name: takeru_outfit

# --- [1] クロール設定 ---
crawl:
  keywords:
    # 服装スタイル（英語）
    - "anime boy hoodie glasses full body front view"
    - "teenage boy black hoodie functional anime glasses"
    - "slim boy glasses casual hoodie standing anime"
    - "anime male teenager hoodie black rimmed glasses"
    - "hoodie anime boy full body standing neutral pose"
    - "functional hoodie young man glasses anime style"
    # 実写参照
    - "teenage boy black hoodie glasses standing full body"
    - "slim male student glasses casual hoodie photo"
    # 日本語キーワード
    - "眼鏡 フーディー 少年 アニメ 全身 正面"
    - "黒縁眼鏡 パーカー 男子 高校生 イラスト 立ち絵"
    - "フード 眼鏡 スリム 男子 アニメ"
  engines:
    - bing
    - google
  max_per_keyword: 80
  output_dir: datasets/{dataset_name}/raw

# --- [2] VLMフィルター設定 ---
vlm_filter:
  ollama_url: http://127.0.0.1:11434
  model: qwen2.5vl:7b
  input_dir: datasets/{dataset_name}/raw
  output_dir: datasets/{dataset_name}/filtered
  must_have:
    - "single male character visible"
    - "full body or at least 3/4 body visible"
    - "hoodie or sweatshirt as upper body clothing"
    - "character appears to be teenager or young adult"
  must_not:
    - "multiple people or group shot"
    - "fantasy armor, mecha, or magical costume"
    - "suit, formal wear, or school uniform blazer"
    - "swimwear or bare torso"
    - "female character"
  min_score: 0.65

# --- [3] キャプション生成設定 ---
caption:
  ollama_url: http://127.0.0.1:11434
  model: qwen2.5vl:7b
  input_dir: datasets/{dataset_name}/filtered
  output_dir: datasets/{dataset_name}/captioned
  trigger_word: "takeru_outfit"
  prompt: |
    Describe this image for Stable Diffusion LoRA training data.
    Focus specifically on:
    1. Upper body clothing (hoodie/sweatshirt color, type, fit, any pockets/zippers)
    2. Lower body clothing (pants color, type, fit)
    3. Footwear
    4. Glasses if present (frame color, style)
    5. Hair style and color

    Format: comma-separated tags in this order:
    trigger_word, 1boy, [age/build tags], [hair], [glasses], [upper clothing], [lower clothing], [footwear], [pose/view]

    Be specific about hoodie details (e.g. "zip-up hoodie" vs "pullover hoodie", "functional utility hoodie").
